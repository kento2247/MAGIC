<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Paper Figure Draft Studio</title>
    <style>
        :root {
            --paper: #f6f0e6;
            --paper-deep: #ead9bd;
            --ink: #1f2a37;
            --ink-soft: #556272;
            --line: rgba(31, 42, 55, 0.12);
            --navy: #18314f;
            --amber: #d7812a;
            --mint: #3b7a6d;
            --rose: #9a4f45;
            --surface: rgba(255, 252, 247, 0.86);
            --shadow: 0 18px 45px rgba(24, 49, 79, 0.12);
            --radius: 26px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Avenir Next", "Segoe UI", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at top left, rgba(215, 129, 42, 0.18), transparent 32%),
                radial-gradient(circle at 85% 18%, rgba(24, 49, 79, 0.18), transparent 24%),
                linear-gradient(160deg, #f7f1e8 0%, #efe6d7 56%, #f4efe9 100%);
        }

        body.modal-open {
            overflow: hidden;
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            inset: auto;
            width: 22rem;
            height: 22rem;
            border-radius: 50%;
            filter: blur(12px);
            pointer-events: none;
            z-index: 0;
        }

        body::before {
            right: -7rem;
            bottom: -6rem;
            background: rgba(59, 122, 109, 0.12);
        }

        body::after {
            left: -7rem;
            top: 10rem;
            background: rgba(154, 79, 69, 0.1);
        }

        .page {
            position: relative;
            z-index: 1;
            width: min(1380px, calc(100vw - 2rem));
            margin: 0 auto;
            padding: 1.4rem 0 2rem;
        }

        .hero {
            display: grid;
            grid-template-columns: 1.5fr 0.9fr;
            gap: 1rem;
            align-items: end;
            margin-bottom: 1rem;
        }

        .hero-card,
        .control-card,
        .panel {
            background: var(--surface);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            backdrop-filter: blur(14px);
        }

        .hero-card {
            padding: 1.4rem 1.5rem;
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            padding: 0.35rem 0.75rem;
            border-radius: 999px;
            background: rgba(24, 49, 79, 0.08);
            color: var(--navy);
            font-size: 0.82rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0.9rem 0 0.45rem;
            font-family: "Iowan Old Style", "Palatino Linotype", serif;
            font-size: clamp(2rem, 3vw, 3.4rem);
            line-height: 0.98;
            letter-spacing: -0.03em;
        }

        .hero p {
            margin: 0;
            color: var(--ink-soft);
            font-size: 0.98rem;
            line-height: 1.65;
        }

        .status-card {
            padding: 1.25rem 1.3rem;
            display: flex;
            flex-direction: column;
            gap: 0.9rem;
        }

        .status-badge {
            display: inline-flex;
            width: fit-content;
            align-items: center;
            gap: 0.45rem;
            padding: 0.45rem 0.78rem;
            border-radius: 999px;
            font-weight: 600;
            font-size: 0.9rem;
            background: rgba(24, 49, 79, 0.1);
            color: var(--navy);
        }

        .status-badge[data-tone="working"] {
            background: rgba(215, 129, 42, 0.16);
            color: #8a4d10;
        }

        .status-badge[data-tone="ready"] {
            background: rgba(59, 122, 109, 0.16);
            color: #21584d;
        }

        .status-badge[data-tone="needs-info"] {
            background: rgba(154, 79, 69, 0.14);
            color: #7d382f;
        }

        .control-card {
            display: grid;
            grid-template-columns: 1.3fr 1fr;
            gap: 1rem;
            padding: 1rem 1.1rem;
            margin-bottom: 1rem;
        }

        .control-stack {
            display: grid;
            gap: 0.9rem;
        }

        .control-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            align-items: center;
        }

        .mode-toggle {
            display: inline-flex;
            align-items: center;
            gap: 0.9rem;
        }

        .mode-toggle-control {
            position: relative;
            display: inline-flex;
            align-items: center;
            cursor: pointer;
        }

        .mode-toggle-copy {
            display: grid;
            gap: 0.12rem;
        }

        .mode-toggle-title {
            font-weight: 700;
            color: var(--navy);
            line-height: 1.2;
        }

        .mode-toggle-state {
            color: var(--ink-soft);
            font-size: 0.82rem;
            line-height: 1.2;
        }

        .mode-toggle-checkbox {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }

        .mode-switch {
            position: relative;
            width: 78px;
            height: 42px;
            border-radius: 999px;
            background: rgba(24, 49, 79, 0.12);
            box-shadow: inset 0 0 0 1px rgba(24, 49, 79, 0.08);
            transition: background 180ms ease;
        }

        .mode-switch::after {
            content: "";
            position: absolute;
            top: 5px;
            left: 5px;
            width: 32px;
            height: 32px;
            border-radius: 999px;
            background: linear-gradient(135deg, #18314f, #32577e);
            box-shadow: 0 10px 20px rgba(24, 49, 79, 0.2);
            transition: transform 180ms ease, background 180ms ease;
        }

        .mode-toggle-checkbox:checked+.mode-switch {
            background: rgba(59, 122, 109, 0.18);
        }

        .mode-toggle-checkbox:checked+.mode-switch::after {
            transform: translateX(36px);
            background: linear-gradient(135deg, #3b7a6d, #61a394);
        }

        .sample-picker {
            display: grid;
            gap: 0.35rem;
            min-width: min(360px, 100%);
        }

        .sample-picker label,
        .editor-head span,
        .chat-meta,
        .hint {
            color: var(--ink-soft);
            font-size: 0.85rem;
        }

        select,
        textarea,
        button {
            font: inherit;
        }

        select,
        textarea {
            width: 100%;
            border-radius: 18px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.7);
            color: var(--ink);
        }

        select {
            padding: 0.8rem 0.95rem;
        }

        .sample-preview {
            display: grid;
            grid-template-columns: 112px 1fr;
            gap: 0.9rem;
            align-items: center;
            padding: 0.45rem;
            border-radius: 20px;
            background:
                linear-gradient(135deg, rgba(255, 255, 255, 0.95), rgba(246, 240, 230, 0.88));
            border: 1px solid rgba(24, 49, 79, 0.08);
            min-height: 138px;
        }

        .sample-preview[hidden] {
            display: none;
        }

        .sample-preview img {
            width: 112px;
            height: 112px;
            object-fit: cover;
            border-radius: 16px;
            background: rgba(24, 49, 79, 0.08);
        }

        .sample-preview strong {
            display: block;
            margin-bottom: 0.35rem;
            font-size: 1rem;
        }

        .sample-preview a {
            color: var(--navy);
            text-decoration: none;
            font-weight: 600;
        }

        .workspace {
            --workspace-panel-height: clamp(560px, 70vh, 760px);
            display: grid;
            grid-template-columns: minmax(0, 1.15fr) minmax(0, 0.85fr);
            gap: 1rem;
            align-items: stretch;
        }

        .panel {
            overflow: hidden;
        }

        .panel-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            padding: 1rem 1.15rem 0.85rem;
            border-bottom: 1px solid rgba(24, 49, 79, 0.08);
        }

        .panel-head h2 {
            margin: 0;
            font-size: 1.08rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .chat-panel {
            display: grid;
            grid-template-rows: auto minmax(0, 1fr) auto;
            height: var(--workspace-panel-height);
        }

        .chat-log {
            padding: 1rem 1.1rem 1.1rem;
            overflow: auto;
            display: grid;
            gap: 0.8rem;
            align-content: start;
            min-height: 0;
            background:
                linear-gradient(180deg, rgba(24, 49, 79, 0.03), rgba(255, 255, 255, 0));
        }

        .message {
            display: grid;
            gap: 0.3rem;
            max-width: 92%;
            animation: rise 220ms ease;
        }

        .message[data-role="user"] {
            justify-self: end;
        }

        .message[data-role="assistant"] {
            justify-self: start;
        }

        .message-tag {
            font-size: 0.76rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--ink-soft);
        }

        .bubble {
            white-space: pre-wrap;
            line-height: 1.65;
            padding: 0.9rem 1rem;
            border-radius: 20px;
            border: 1px solid rgba(24, 49, 79, 0.08);
            background: rgba(255, 255, 255, 0.84);
        }

        .message[data-role="user"] .bubble {
            background: linear-gradient(140deg, rgba(24, 49, 79, 0.95), rgba(50, 87, 126, 0.9));
            color: #ffffff;
            border-top-right-radius: 8px;
        }

        .message[data-role="assistant"] .bubble {
            border-top-left-radius: 8px;
            background: linear-gradient(180deg, rgba(255, 252, 247, 0.98), rgba(249, 243, 233, 0.9));
        }

        .message[data-state="pending"] .bubble {
            display: inline-flex;
            align-items: center;
            gap: 0.8rem;
        }

        .assistant-pending-text {
            color: var(--ink);
        }

        .assistant-pending-dots {
            display: inline-flex;
            align-items: center;
            gap: 0.32rem;
            flex: 0 0 auto;
        }

        .assistant-pending-dots span {
            width: 0.44rem;
            height: 0.44rem;
            border-radius: 50%;
            background: rgba(215, 129, 42, 0.82);
            animation: assistantPulse 1s ease-in-out infinite;
        }

        .assistant-pending-dots span:nth-child(2) {
            animation-delay: 120ms;
        }

        .assistant-pending-dots span:nth-child(3) {
            animation-delay: 240ms;
        }

        @keyframes assistantPulse {

            0%,
            80%,
            100% {
                transform: translateY(0);
                opacity: 0.35;
            }

            40% {
                transform: translateY(-2px);
                opacity: 1;
            }
        }

        .chat-empty {
            padding: 1rem;
            border: 1px dashed rgba(24, 49, 79, 0.15);
            border-radius: 20px;
            color: var(--ink-soft);
            background: rgba(255, 255, 255, 0.45);
        }

        .composer {
            padding: 1rem 1.05rem 1.05rem;
            border-top: 1px solid rgba(24, 49, 79, 0.08);
            background: rgba(255, 255, 255, 0.5);
        }

        .composer textarea {
            min-height: 96px;
            max-height: 180px;
            resize: vertical;
            padding: 0.95rem 1rem;
            line-height: 1.6;
        }

        .composer-actions {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            margin-top: 0.8rem;
        }

        .head-meta {
            color: var(--ink-soft);
            font-size: 0.85rem;
            text-align: right;
        }

        .button-row {
            display: inline-flex;
            justify-content: center;
            gap: 0.6rem;
        }

        button {
            border: 0;
            cursor: pointer;
            transition: transform 180ms ease, opacity 180ms ease, box-shadow 180ms ease;
        }

        button:hover {
            transform: translateY(-1px);
        }

        button:disabled {
            cursor: wait;
            opacity: 0.6;
            transform: none;
        }

        .primary {
            padding: 0.82rem 1.2rem;
            border-radius: 999px;
            color: #fff;
            background: linear-gradient(135deg, #d7812a, #c35a28);
            box-shadow: 0 12px 24px rgba(195, 90, 40, 0.22);
        }

        .secondary {
            padding: 0.82rem 1.05rem;
            border-radius: 999px;
            background: rgba(24, 49, 79, 0.08);
            color: var(--navy);
        }

        .editor-stack {
            display: grid;
            grid-template-rows: minmax(0, 1fr) auto;
            gap: 1rem;
            min-height: 0;
            height: var(--workspace-panel-height);
        }

        .editor-card {
            display: grid;
            grid-template-rows: auto minmax(0, 1fr);
            min-height: 0;
        }

        .editor-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        .editor-card textarea {
            height: 100%;
            min-height: 0;
            padding: 1rem 1.05rem 1.1rem;
            resize: none;
            border: 0;
            border-radius: 0;
            background: transparent;
            outline: none;
            line-height: 1.68;
        }

        #summaryEditor {
            overflow: auto;
        }

        #captionEditor {
            min-height: 132px;
            height: 132px;
        }

        .editor-card textarea:focus,
        .composer textarea:focus,
        select:focus {
            outline: 2px solid rgba(215, 129, 42, 0.28);
            outline-offset: 0;
        }

        .editor-meta {
            padding: 0 1.15rem 1rem;
            color: var(--ink-soft);
            font-size: 0.83rem;
        }

        .generation-area {
            display: grid;
            gap: 0.85rem;
            padding: 1rem 1.15rem 1rem;
        }

        .generation-toolbar {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 0.8rem;
        }

        .generated-preview {
            display: grid;
            place-items: center;
            min-height: 180px;
            padding: 0.7rem;
            border-radius: 22px;
            border: 1px solid rgba(24, 49, 79, 0.1);
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(246, 240, 230, 0.88));
        }

        .generated-preview[hidden] {
            display: none;
        }

        .generated-preview img {
            max-width: 100%;
            max-height: 260px;
            object-fit: contain;
            border-radius: 16px;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 20;
            display: grid;
            place-items: center;
            padding: 1rem;
            background: rgba(20, 27, 36, 0.54);
            backdrop-filter: blur(8px);
        }

        .modal-overlay[hidden] {
            display: none;
        }

        .modal-card {
            width: min(900px, calc(100vw - 2rem));
            max-height: calc(100vh - 2rem);
            overflow: auto;
            border-radius: 28px;
            background: rgba(255, 252, 247, 0.96);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 28px 70px rgba(24, 49, 79, 0.24);
        }

        .modal-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            padding: 1rem 1.15rem;
            border-bottom: 1px solid rgba(24, 49, 79, 0.08);
        }

        .modal-head h3 {
            margin: 0;
            font-size: 1.08rem;
        }

        .modal-body {
            padding: 1.15rem;
            display: grid;
            gap: 1rem;
        }

        .modal-loading,
        .modal-feedback {
            display: grid;
            place-items: center;
            gap: 0.85rem;
            min-height: 360px;
            padding: 1rem;
            text-align: center;
            color: var(--ink-soft);
        }

        .modal-loading,
        .modal-image-wrap {
            border-radius: 24px;
            border: 1px solid rgba(24, 49, 79, 0.1);
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(246, 240, 230, 0.92));
        }

        .modal-loading[hidden],
        .modal-feedback[hidden],
        .modal-result[hidden] {
            display: none !important;
        }

        .modal-feedback {
            border: 1px dashed rgba(154, 79, 69, 0.22);
            border-radius: 22px;
            background: rgba(154, 79, 69, 0.06);
            color: #7d382f;
        }

        .spinner {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            border: 5px solid rgba(24, 49, 79, 0.14);
            border-top-color: var(--amber);
            animation: spin 900ms linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .modal-result {
            display: grid;
            gap: 1rem;
        }

        .modal-image-wrap {
            display: grid;
            place-items: center;
            min-height: 360px;
            padding: 1rem;
            overflow: hidden;
        }

        .modal-image-stage {
            position: relative;
            display: inline-grid;
            place-items: center;
            max-width: 100%;
            isolation: isolate;
        }

        .modal-image-wrap img {
            display: block;
            max-width: 100%;
            max-height: min(62vh, 720px);
            object-fit: contain;
            border-radius: 18px;
        }

        .modal-actions {
            display: grid;
            justify-items: center;
            gap: 0.9rem;
        }

        .icon-button {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
        }

        .icon-button svg {
            width: 18px;
            height: 18px;
            flex: 0 0 18px;
        }

        .export-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            border-radius: 18px;
            overflow: hidden;
        }

        .export-overlay[hidden] {
            display: none !important;
        }

        .export-overlay-canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
            border-radius: 18px;
        }

        .export-overlay-hud {
            position: absolute;
            inset: 0;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
            padding: 1rem;
        }

        .export-overlay-copy {
            display: grid;
            gap: 0.45rem;
            max-width: min(74%, 420px);
        }

        .export-overlay-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            width: fit-content;
            padding: 0.38rem 0.7rem;
            border-radius: 999px;
            background: rgba(18, 25, 35, 0.74);
            color: #fffdf9;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            backdrop-filter: blur(10px);
        }

        .export-overlay-label {
            padding: 0.62rem 0.8rem;
            border-radius: 14px;
            background: rgba(255, 253, 249, 0.82);
            color: var(--ink);
            font-size: 0.92rem;
            font-weight: 600;
            line-height: 1.35;
            box-shadow: 0 18px 36px rgba(24, 49, 79, 0.12);
            backdrop-filter: blur(10px);
        }

        .export-overlay-metric {
            padding: 0.46rem 0.7rem;
            border-radius: 999px;
            background: rgba(255, 253, 249, 0.82);
            color: var(--ink-soft);
            font-size: 0.74rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            box-shadow: 0 18px 36px rgba(24, 49, 79, 0.12);
            backdrop-filter: blur(10px);
        }

        .export-overlay-progress {
            position: absolute;
            left: 50%;
            bottom: 1rem;
            transform: translateX(-50%);
            display: inline-flex;
            gap: 0.45rem;
            padding: 0.46rem 0.52rem;
            border-radius: 999px;
            background: rgba(18, 25, 35, 0.66);
            backdrop-filter: blur(10px);
        }

        .export-progress-step {
            width: 1.9rem;
            height: 0.38rem;
            border-radius: 999px;
            background: rgba(255, 253, 249, 0.2);
            transition: background 180ms ease, box-shadow 180ms ease, transform 180ms ease;
        }

        .export-progress-step[data-state="active"] {
            background: var(--amber);
            box-shadow: 0 0 0 6px rgba(215, 129, 42, 0.14);
            transform: scaleX(1.04);
        }

        .export-progress-step[data-state="done"] {
            background: #4a7a5d;
            box-shadow: none;
        }

        @media (max-width: 720px) {
            .export-overlay-hud {
                flex-direction: column;
                align-items: stretch;
                gap: 0.75rem;
                padding: 0.8rem;
            }

            .export-overlay-copy {
                max-width: none;
            }
        }

        @keyframes rise {
            from {
                opacity: 0;
                transform: translateY(6px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 1080px) {

            .hero,
            .control-card,
            .workspace {
                grid-template-columns: 1fr;
            }

            .editor-stack {
                grid-template-rows: auto auto;
                height: auto;
            }

            .chat-panel {
                height: auto;
                min-height: 520px;
            }

            .chat-log {
                max-height: 420px;
            }
        }

        @media (max-width: 720px) {
            .page {
                width: min(100vw - 1rem, 1380px);
                padding-top: 0.8rem;
            }

            h1 {
                font-size: 2.2rem;
            }

            .sample-preview {
                grid-template-columns: 1fr;
            }

            .sample-preview img {
                width: 100%;
                height: 180px;
            }

            .composer-actions {
                flex-direction: column;
                align-items: stretch;
            }

            .button-row {
                width: 100%;
                justify-content: stretch;
            }

            .button-row button {
                flex: 1;
            }
        }
    </style>
</head>

<body>
    <div class="page">
        <section class="control-card">
            <div class="control-stack">
                <div class="sample-picker">
                    <label for="sampleSelect">チャット選択</label>
                    <select id="sampleSelect">
                        <option value="__new__">新規チャット</option>
                        {% if demo_samples %}
                        {% for sample in demo_samples %}
                        <option value="{{ sample }}">{{ sample }}</option>
                        {% endfor %}
                        {% endif %}
                    </select>
                </div>
            </div>
        </section>
        <section class="workspace">
            <article class="panel chat-panel">
                <div class="panel-head">
                    <div>
                        <h2>Chat Workspace</h2>
                        <div class="chat-meta" id="chatMeta">手法説明の入力と追加回答</div>
                    </div>
                    <div class="head-meta" id="draftMeta">まだ送信されていません。</div>
                </div>

                <div class="chat-log" id="chatLog" aria-live="polite"></div>

                <div class="composer">
                    <textarea id="chatInput" placeholder="論文の手法説明を書いてください。足りない情報があれば追加で質問します。"></textarea>
                    <div class="composer-actions">
                        <div class="button-row">
                            <button class="primary" id="sendButton" type="button">送信</button>
                        </div>
                    </div>
                </div>
            </article>

            <div class="editor-stack">
                <article class="panel editor-card">
                    <div class="panel-head editor-head">
                        <div>
                            <h2>整理された説明</h2>
                            <span>Markdown 文字列として編集できます。</span>
                        </div>
                    </div>
                    <textarea id="summaryEditor" placeholder="十分な説明が集まると、ここに整理済み Markdown が表示されます。"></textarea>
                </article>

                <article class="panel editor-card">
                    <div class="panel-head editor-head">
                        <div>
                            <h2>図キャプション</h2>
                            <span>文字列として編集できます。</span>
                        </div>
                    </div>
                    <textarea id="captionEditor" placeholder="図キャプションがここに入ります。"></textarea>
                    <div class="generation-area">
                        <div class="generation-toolbar">
                            <button class="primary" id="generateButton" type="button">Generate Figure</button>
                        </div>

        <div class="modal-overlay" id="generationModal" hidden>
            <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="generationModalTitle">
                <div class="modal-head">
                    <h3 id="generationModalTitle">Generated Figure</h3>
                    <button class="secondary" id="closeModalButton" type="button">閉じる</button>
                </div>
                <div class="modal-body">
                    <div class="modal-loading" id="modalLoading">
                        <div class="spinner" aria-hidden="true"></div>
                        <div id="modalLoadingText">図を生成しています。しばらくお待ちください。</div>
                    </div>
                    <div class="modal-feedback" id="modalFeedback" hidden></div>
                    <div class="modal-result" id="modalResult" hidden>
                        <div class="modal-image-wrap">
                            <div class="modal-image-stage">
                                <img id="modalImage" alt="generated figure">
                                <div class="export-overlay" id="exportOverlay" hidden>
                                    <canvas class="export-overlay-canvas" id="exportOverlayCanvas"></canvas>
                                    <div class="export-overlay-hud">
                                        <div class="export-overlay-copy">
                                            <div class="export-overlay-chip">Exporting SVG</div>
                                            <div class="export-overlay-label" id="exportOverlayLabel">
                                                OCR: 文字候補を走査しています。
                                            </div>
                                        </div>
                                        <div class="export-overlay-metric" id="exportOverlayMetric">OCR</div>
                                    </div>
                                    <div class="export-overlay-progress">
                                        <span class="export-progress-step" data-state="idle"></span>
                                        <span class="export-progress-step" data-state="idle"></span>
                                        <span class="export-progress-step" data-state="idle"></span>
                                        <span class="export-progress-step" data-state="idle"></span>
                                        <span class="export-progress-step" data-state="idle"></span>
                                        <span class="export-progress-step" data-state="idle"></span>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="modal-actions">
                            <button class="secondary icon-button" id="saveSvgButton" type="button" disabled>
                                <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                                    <path d="M12 3V15" stroke="currentColor" stroke-width="1.8"
                                        stroke-linecap="round" />
                                    <path d="M7.5 10.5L12 15L16.5 10.5" stroke="currentColor" stroke-width="1.8"
                                        stroke-linecap="round" stroke-linejoin="round" />
                                    <path d="M5 20H19" stroke="currentColor" stroke-width="1.8"
                                        stroke-linecap="round" />
                                </svg>
                                <span>Export SVG</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const demoSamples = {{ demo_samples | tojson }};
        const EXPORT_STAGE_LABELS = [
            "OCR: 文字候補を走査しています。",
            "Erase text: 検出した文字領域を消去しています。",
            "Detect arrows: 矢印の候補を検出しています。",
            "Erase arrows before SAM: SAM 前処理として矢印を消去しています。",
            "SAM: 領域マスクを推定しています。",
            "Merge: 各結果を統合して SVG export を組み立てています。",
        ];

        const state = {
            mode: "new",
            sampleName: "",
            compiledInstruction: "",
            messages: [],
            busy: false,
            assistantActivity: "",
            generatedImageSrc: "",
            generatedImageDataUrl: "",
            generatedImageWidth: 0,
            generatedImageHeight: 0,
            exportInProgress: false,
        };

        const elements = {
            statusBadge: document.getElementById("statusBadge"),
            statusText: document.getElementById("statusText"),
            sampleSelect: document.getElementById("sampleSelect"),
            samplePreview: document.getElementById("samplePreview"),
            samplePreviewImage: document.getElementById("samplePreviewImage"),
            samplePreviewTitle: document.getElementById("samplePreviewTitle"),
            samplePreviewMeta: document.getElementById("samplePreviewMeta"),
            samplePreviewLinks: document.getElementById("samplePreviewLinks"),
            chatLog: document.getElementById("chatLog"),
            chatInput: document.getElementById("chatInput"),
            chatMeta: document.getElementById("chatMeta"),
            draftMeta: document.getElementById("draftMeta"),
            sendButton: document.getElementById("sendButton"),
            generateButton: document.getElementById("generateButton"),
            summaryEditor: document.getElementById("summaryEditor"),
            captionEditor: document.getElementById("captionEditor"),
            generateHint: document.getElementById("generateHint"),
            generationMeta: document.getElementById("generationMeta"),
            generationModal: document.getElementById("generationModal"),
            closeModalButton: document.getElementById("closeModalButton"),
            modalLoading: document.getElementById("modalLoading"),
            modalLoadingText: document.getElementById("modalLoadingText"),
            modalFeedback: document.getElementById("modalFeedback"),
            modalResult: document.getElementById("modalResult"),
            modalImage: document.getElementById("modalImage"),
            saveSvgButton: document.getElementById("saveSvgButton"),
            exportOverlay: document.getElementById("exportOverlay"),
            exportOverlayCanvas: document.getElementById("exportOverlayCanvas"),
            exportOverlayLabel: document.getElementById("exportOverlayLabel"),
            exportOverlayMetric: document.getElementById("exportOverlayMetric"),
            exportProgressSteps: Array.from(document.querySelectorAll("#exportOverlay .export-progress-step")),
        };

        function setBusy(isBusy) {
            state.busy = isBusy;
            elements.sendButton.disabled = isBusy;
            elements.generateButton.disabled = isBusy;
            elements.sampleSelect.disabled = isBusy;
        }

        function setStatus(text, tone, detail) {
            if (elements.statusBadge) {
                elements.statusBadge.textContent = text;
                elements.statusBadge.dataset.tone = tone;
            }
            if (elements.statusText) {
                elements.statusText.textContent = detail;
            }
        }

        function renderMessages() {
            const messageMarkup = state.messages.map((message) => {
                const roleLabel = message.role === "user" ? "User" : "Assistant";
                return `
                    <article class="message" data-role="${message.role}">
                        <div class="message-tag">${roleLabel}</div>
                        <div class="bubble">${escapeHtml(message.text)}</div>
                    </article>
                `;
            }).join("");

            const activityMarkup = state.assistantActivity ? `
                <article class="message" data-role="assistant" data-state="pending">
                    <div class="message-tag">Assistant</div>
                    <div class="bubble">
                        <span class="assistant-pending-text">${escapeHtml(state.assistantActivity)}</span>
                        <span class="assistant-pending-dots" aria-hidden="true">
                            <span></span>
                            <span></span>
                            <span></span>
                        </span>
                    </div>
                </article>
            ` : "";

            const markup = `${messageMarkup}${activityMarkup}`;

            if (!markup) {
                elements.chatLog.innerHTML = '<div class="chat-empty">ここに対話履歴が表示されます。</div>';
                return;
            }

            elements.chatLog.innerHTML = markup;
            elements.chatLog.scrollTop = elements.chatLog.scrollHeight;
        }

        function escapeHtml(text) {
            return text
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#39;")
                .replaceAll("\n", "<br>");
        }

        function pushMessage(role, text) {
            if (!text) {
                return;
            }
            state.messages.push({ role, text });
            renderMessages();
        }

        function setAssistantActivity(text) {
            state.assistantActivity = text || "";
            renderMessages();
        }

        function clearAssistantActivity() {
            if (!state.assistantActivity) {
                return;
            }
            state.assistantActivity = "";
            renderMessages();
        }

        function syncDraftMeta() {
            const length = state.compiledInstruction.trim().length;
            if (length === 0) {
                elements.draftMeta.textContent = "まだ送信されていません。";
                return;
            }
            elements.draftMeta.textContent = `現在の統合説明: ${length} characters`;
        }

        function syncGenerateHint() {
            if (!elements.generateHint) {
                return;
            }
            elements.generateHint.textContent = "Generate Figure で図を生成します。";
        }

        function clearGeneratedImage() {
            state.generatedImageSrc = "";
            state.generatedImageDataUrl = "";
            state.generatedImageWidth = 0;
            state.generatedImageHeight = 0;
            state.exportInProgress = false;
            elements.modalImage.onload = null;
            elements.modalImage.onerror = null;
            elements.modalImage.removeAttribute("src");
            elements.modalLoading.hidden = false;
            elements.modalFeedback.hidden = true;
            elements.modalFeedback.textContent = "";
            elements.modalResult.hidden = true;
            elements.saveSvgButton.disabled = true;
            resetExportVisualization();
            if (elements.generationMeta) {
                elements.generationMeta.textContent = "生成結果はポップアップに表示されます。";
            }
        }

        function openGenerationModal() {
            elements.generationModal.hidden = false;
            document.body.classList.add("modal-open");
        }

        function closeGenerationModal() {
            elements.generationModal.hidden = true;
            document.body.classList.remove("modal-open");
        }

        function showModalLoading(message) {
            openGenerationModal();
            elements.modalLoading.hidden = false;
            elements.modalLoadingText.textContent = message;
            elements.modalFeedback.hidden = true;
            elements.modalFeedback.textContent = "";
            elements.modalResult.hidden = true;
            elements.saveSvgButton.disabled = true;
        }

        function showModalError(message) {
            openGenerationModal();
            elements.modalLoading.hidden = true;
            elements.modalResult.hidden = true;
            elements.modalFeedback.hidden = false;
            elements.modalFeedback.textContent = message;
            elements.saveSvgButton.disabled = true;
        }

        function updateGeneratedImageSize() {
            state.generatedImageWidth = elements.modalImage.naturalWidth || 0;
            state.generatedImageHeight = elements.modalImage.naturalHeight || 0;
        }

        function resetExportVisualization() {
            elements.exportOverlay.hidden = true;
            elements.exportOverlayLabel.textContent = EXPORT_STAGE_LABELS[0];
            elements.exportOverlayMetric.textContent = "OCR";
            elements.exportProgressSteps.forEach((step) => {
                step.dataset.state = "idle";
            });
            const context = elements.exportOverlayCanvas.getContext("2d");
            context.clearRect(0, 0, elements.exportOverlayCanvas.width, elements.exportOverlayCanvas.height);
        }

        function sleep(ms) {
            return new Promise((resolve) => window.setTimeout(resolve, ms));
        }

        function createCanvasSurface(width, height) {
            const canvas = document.createElement("canvas");
            canvas.width = Math.max(1, width);
            canvas.height = Math.max(1, height);
            const context = canvas.getContext("2d", { willReadFrequently: true });
            return { canvas, context };
        }

        function syncExportOverlayCanvasSize() {
            const canvas = elements.exportOverlayCanvas;
            const imageRect = elements.modalImage.getBoundingClientRect();
            const cssWidth = Math.max(1, Math.round(imageRect.width || elements.modalImage.clientWidth || 1));
            const cssHeight = Math.max(1, Math.round(imageRect.height || elements.modalImage.clientHeight || 1));
            const dpr = window.devicePixelRatio || 1;
            canvas.width = Math.max(1, Math.round(cssWidth * dpr));
            canvas.height = Math.max(1, Math.round(cssHeight * dpr));
            return {
                width: canvas.width,
                height: canvas.height,
            };
        }

        function createRasterSurface(image, width, height) {
            const { canvas, context } = createCanvasSurface(width, height);
            context.drawImage(image, 0, 0, width, height);
            return canvas;
        }

        function extractGrayMap(imageData) {
            const gray = new Float32Array(imageData.width * imageData.height);
            for (let i = 0; i < gray.length; i += 1) {
                const baseIndex = i * 4;
                const alpha = imageData.data[baseIndex + 3] / 255;
                const red = imageData.data[baseIndex];
                const green = imageData.data[baseIndex + 1];
                const blue = imageData.data[baseIndex + 2];
                gray[i] = (0.299 * red + 0.587 * green + 0.114 * blue) * alpha + 248 * (1 - alpha);
            }
            return gray;
        }

        function computeEdgeMagnitudes(gray, width, height) {
            const edges = new Float32Array(width * height);
            for (let y = 1; y < height - 1; y += 1) {
                for (let x = 1; x < width - 1; x += 1) {
                    const index = y * width + x;
                    const topLeft = gray[index - width - 1];
                    const top = gray[index - width];
                    const topRight = gray[index - width + 1];
                    const left = gray[index - 1];
                    const right = gray[index + 1];
                    const bottomLeft = gray[index + width - 1];
                    const bottom = gray[index + width];
                    const bottomRight = gray[index + width + 1];

                    const gradientX =
                        -topLeft + topRight
                        - 2 * left + 2 * right
                        - bottomLeft + bottomRight;
                    const gradientY =
                        -topLeft - 2 * top - topRight
                        + bottomLeft + 2 * bottom + bottomRight;
                    edges[index] = Math.sqrt(gradientX * gradientX + gradientY * gradientY);
                }
            }
            return edges;
        }

        function clamp(value, min, max) {
            return Math.min(Math.max(value, min), max);
        }

        function roundedRectPath(context, x, y, width, height, radius) {
            const r = Math.min(radius, width / 2, height / 2);
            context.beginPath();
            context.moveTo(x + r, y);
            context.arcTo(x + width, y, x + width, y + height, r);
            context.arcTo(x + width, y + height, x, y + height, r);
            context.arcTo(x, y + height, x, y, r);
            context.arcTo(x, y, x + width, y, r);
            context.closePath();
        }

        function fillRoundedRect(context, x, y, width, height, radius) {
            roundedRectPath(context, x, y, width, height, radius);
            context.fill();
        }

        function strokeRoundedRect(context, x, y, width, height, radius) {
            roundedRectPath(context, x, y, width, height, radius);
            context.stroke();
        }

        function sampleAverageColor(imageData, x, y, width, height) {
            const x0 = clamp(Math.floor(x), 0, imageData.width - 1);
            const y0 = clamp(Math.floor(y), 0, imageData.height - 1);
            const x1 = clamp(Math.ceil(x + width), x0 + 1, imageData.width);
            const y1 = clamp(Math.ceil(y + height), y0 + 1, imageData.height);
            const step = Math.max(1, Math.round(Math.min(x1 - x0, y1 - y0) / 18));
            let red = 0;
            let green = 0;
            let blue = 0;
            let count = 0;

            for (let row = y0; row < y1; row += step) {
                for (let col = x0; col < x1; col += step) {
                    const index = (row * imageData.width + col) * 4;
                    red += imageData.data[index];
                    green += imageData.data[index + 1];
                    blue += imageData.data[index + 2];
                    count += 1;
                }
            }

            if (count === 0) {
                return { red: 248, green: 240, blue: 230 };
            }

            return {
                red: Math.round(red / count),
                green: Math.round(green / count),
                blue: Math.round(blue / count),
            };
        }

        function detectTextBoxes(sourceCanvas) {
            const { width, height } = sourceCanvas;
            const context = sourceCanvas.getContext("2d", { willReadFrequently: true });
            const imageData = context.getImageData(0, 0, width, height);
            const gray = extractGrayMap(imageData);
            const rowDensity = new Float32Array(height);

            for (let y = 0; y < height; y += 1) {
                let count = 0;
                for (let x = 0; x < width; x += 1) {
                    if (gray[y * width + x] < 166) {
                        count += 1;
                    }
                }
                rowDensity[y] = count;
            }

            const rowThreshold = width * 0.14;
            const bands = [];
            let bandStart = -1;

            for (let y = 0; y < height; y += 1) {
                const active = rowDensity[y] > rowThreshold;
                if (active && bandStart < 0) {
                    bandStart = y;
                    continue;
                }
                if (!active && bandStart >= 0) {
                    if (y - bandStart >= 4) {
                        bands.push([bandStart, y]);
                    }
                    bandStart = -1;
                }
            }

            if (bandStart >= 0) {
                bands.push([bandStart, height]);
            }

            const boxes = [];

            for (const [bandTop, bandBottom] of bands) {
                const bandHeight = bandBottom - bandTop;
                if (bandHeight > height * 0.18) {
                    continue;
                }

                const columnDensity = new Float32Array(width);
                for (let x = 0; x < width; x += 1) {
                    let count = 0;
                    for (let y = bandTop; y < bandBottom; y += 1) {
                        if (gray[y * width + x] < 172) {
                            count += 1;
                        }
                    }
                    columnDensity[x] = count;
                }

                const columnThreshold = Math.max(2, bandHeight * 0.32);
                let boxStart = -1;

                for (let x = 0; x < width; x += 1) {
                    const active = columnDensity[x] >= columnThreshold;
                    if (active && boxStart < 0) {
                        boxStart = x;
                        continue;
                    }
                    if (!active && boxStart >= 0) {
                        const boxWidth = x - boxStart;
                        if (boxWidth >= width * 0.05) {
                            boxes.push({
                                x: clamp(boxStart - 8, 0, width - 1),
                                y: clamp(bandTop - 5, 0, height - 1),
                                width: clamp(boxWidth + 16, 12, width),
                                height: clamp(bandHeight + 10, 10, height),
                            });
                        }
                        boxStart = -1;
                    }
                }

                if (boxStart >= 0) {
                    const boxWidth = width - boxStart;
                    if (boxWidth >= width * 0.05) {
                        boxes.push({
                            x: clamp(boxStart - 8, 0, width - 1),
                            y: clamp(bandTop - 5, 0, height - 1),
                            width: clamp(boxWidth + 12, 12, width),
                            height: clamp(bandHeight + 10, 10, height),
                        });
                    }
                }
            }

            boxes.sort((a, b) => (b.width * b.height) - (a.width * a.height));
            const limitedBoxes = boxes.slice(0, 10);

            if (limitedBoxes.length >= 2) {
                return limitedBoxes;
            }

            return [
                { x: width * 0.12, y: height * 0.18, width: width * 0.36, height: Math.max(18, height * 0.075) },
                { x: width * 0.46, y: height * 0.44, width: width * 0.28, height: Math.max(18, height * 0.08) },
                { x: width * 0.18, y: height * 0.68, width: width * 0.34, height: Math.max(18, height * 0.072) },
            ];
        }

        function createOcrOverlayCanvas(sourceCanvas, textBoxes) {
            const { width, height } = sourceCanvas;
            const { canvas, context } = createCanvasSurface(width, height);
            const lineWidth = Math.max(2, width / 360);
            context.save();
            context.lineWidth = lineWidth;
            context.setLineDash([Math.max(12, width / 30), Math.max(8, width / 50)]);

            textBoxes.forEach((box, index) => {
                const labelWidth = Math.max(38, box.width * 0.18);
                const labelHeight = Math.max(18, box.height * 0.44);
                context.strokeStyle = index % 2 === 0 ? "rgba(215, 129, 42, 0.94)" : "rgba(67, 121, 212, 0.92)";
                strokeRoundedRect(context, box.x, box.y, box.width, box.height, Math.max(8, box.height * 0.22));
                context.fillStyle = "rgba(18, 25, 35, 0.74)";
                fillRoundedRect(context, box.x, Math.max(0, box.y - labelHeight - 4), labelWidth, labelHeight, labelHeight / 2);
                context.fillStyle = "#fffdf9";
                context.font = `700 ${Math.max(11, Math.round(width / 64))}px ui-monospace, SFMono-Regular, Menlo, monospace`;
                context.textAlign = "left";
                context.fillText("OCR", box.x + 10, Math.max(14, box.y - 8));
            });

            context.restore();
            return canvas;
        }

        function createTextErasedSurface(sourceCanvas, textBoxes) {
            const { width, height } = sourceCanvas;
            const sourceContext = sourceCanvas.getContext("2d", { willReadFrequently: true });
            const sourceData = sourceContext.getImageData(0, 0, width, height);
            const { canvas, context } = createCanvasSurface(width, height);
            context.drawImage(sourceCanvas, 0, 0);

            for (const box of textBoxes) {
                const color = sampleAverageColor(
                    sourceData,
                    box.x - box.width * 0.18,
                    box.y - box.height * 0.18,
                    box.width * 1.36,
                    box.height * 1.36
                );
                context.save();
                context.fillStyle = `rgba(${color.red}, ${color.green}, ${color.blue}, 0.985)`;
                fillRoundedRect(context, box.x - 2, box.y - 1, box.width + 4, box.height + 2, Math.max(8, box.height * 0.24));
                context.strokeStyle = `rgba(${Math.max(0, color.red - 12)}, ${Math.max(0, color.green - 10)}, ${Math.max(0, color.blue - 8)}, 0.32)`;
                context.lineWidth = Math.max(1.25, box.height / 16);
                const stripeStep = Math.max(4, box.height / 4.2);
                for (let y = box.y + stripeStep * 0.7; y < box.y + box.height; y += stripeStep) {
                    context.beginPath();
                    context.moveTo(box.x + 6, y);
                    context.lineTo(box.x + box.width - 6, y);
                    context.stroke();
                }
                context.restore();
            }

            return canvas;
        }

        function detectArrowSegments(sourceCanvas) {
            const { width, height } = sourceCanvas;
            const context = sourceCanvas.getContext("2d", { willReadFrequently: true });
            const imageData = context.getImageData(0, 0, width, height);
            const gray = extractGrayMap(imageData);
            const edges = computeEdgeMagnitudes(gray, width, height);
            const candidates = [];
            const rowStep = Math.max(6, Math.round(height / 48));
            const columnStep = Math.max(6, Math.round(width / 52));
            const minimumHorizontalLength = Math.max(28, Math.round(width * 0.14));
            const minimumVerticalLength = Math.max(28, Math.round(height * 0.14));

            for (let y = rowStep; y < height - rowStep; y += rowStep) {
                let start = -1;
                let score = 0;
                for (let x = 1; x < width - 1; x += 1) {
                    const signal = edges[y * width + x] * 0.7 + (255 - gray[y * width + x]) * 0.42;
                    if (signal > 84) {
                        if (start < 0) {
                            start = x;
                        }
                        score += signal;
                        continue;
                    }
                    if (start >= 0) {
                        const length = x - start;
                        if (length >= minimumHorizontalLength) {
                            candidates.push({
                                orientation: "horizontal",
                                x1: start,
                                y1: y,
                                x2: x,
                                y2: y,
                                score: score / length,
                            });
                        }
                        start = -1;
                        score = 0;
                    }
                }
            }

            for (let x = columnStep; x < width - columnStep; x += columnStep) {
                let start = -1;
                let score = 0;
                for (let y = 1; y < height - 1; y += 1) {
                    const signal = edges[y * width + x] * 0.7 + (255 - gray[y * width + x]) * 0.42;
                    if (signal > 84) {
                        if (start < 0) {
                            start = y;
                        }
                        score += signal;
                        continue;
                    }
                    if (start >= 0) {
                        const length = y - start;
                        if (length >= minimumVerticalLength) {
                            candidates.push({
                                orientation: "vertical",
                                x1: x,
                                y1: start,
                                x2: x,
                                y2: y,
                                score: score / length,
                            });
                        }
                        start = -1;
                        score = 0;
                    }
                }
            }

            candidates.sort((a, b) => {
                const aLength = Math.hypot(a.x2 - a.x1, a.y2 - a.y1);
                const bLength = Math.hypot(b.x2 - b.x1, b.y2 - b.y1);
                return (b.score * bLength) - (a.score * aLength);
            });

            const arrows = [];
            for (const candidate of candidates) {
                const centerX = (candidate.x1 + candidate.x2) / 2;
                const centerY = (candidate.y1 + candidate.y2) / 2;
                const duplicated = arrows.some((arrow) => {
                    if (arrow.orientation !== candidate.orientation) {
                        return false;
                    }
                    return Math.abs(((arrow.x1 + arrow.x2) / 2) - centerX) < width * 0.08
                        && Math.abs(((arrow.y1 + arrow.y2) / 2) - centerY) < height * 0.08;
                });
                if (duplicated) {
                    continue;
                }
                arrows.push(candidate);
                if (arrows.length >= 5) {
                    break;
                }
            }

            if (arrows.length > 0) {
                return arrows;
            }

            return [
                {
                    orientation: "horizontal",
                    x1: width * 0.16,
                    y1: height * 0.34,
                    x2: width * 0.48,
                    y2: height * 0.34,
                    score: 1,
                },
                {
                    orientation: "vertical",
                    x1: width * 0.7,
                    y1: height * 0.22,
                    x2: width * 0.7,
                    y2: height * 0.56,
                    score: 1,
                },
            ];
        }

        function drawArrow(context, arrow, color, lineWidth, alpha = 1) {
            const dx = arrow.x2 - arrow.x1;
            const dy = arrow.y2 - arrow.y1;
            const length = Math.hypot(dx, dy) || 1;
            const unitX = dx / length;
            const unitY = dy / length;
            const headLength = Math.max(12, lineWidth * 4.4);
            const headWidth = Math.max(8, lineWidth * 2.8);
            const backX = arrow.x2 - unitX * headLength;
            const backY = arrow.y2 - unitY * headLength;
            const normalX = -unitY;
            const normalY = unitX;

            context.save();
            context.globalAlpha = alpha;
            context.strokeStyle = color;
            context.fillStyle = color;
            context.lineWidth = lineWidth;
            context.lineCap = "round";
            context.lineJoin = "round";
            context.beginPath();
            context.moveTo(arrow.x1, arrow.y1);
            context.lineTo(arrow.x2, arrow.y2);
            context.stroke();
            context.beginPath();
            context.moveTo(arrow.x2, arrow.y2);
            context.lineTo(backX + normalX * headWidth, backY + normalY * headWidth);
            context.lineTo(backX - normalX * headWidth, backY - normalY * headWidth);
            context.closePath();
            context.fill();
            context.restore();
        }

        function createArrowOverlayCanvas(sourceCanvas, arrows) {
            const { width, height } = sourceCanvas;
            const { canvas, context } = createCanvasSurface(width, height);
            const lineWidth = Math.max(3, width / 220);

            for (const arrow of arrows) {
                drawArrow(context, arrow, "rgba(255, 253, 249, 0.18)", lineWidth * 2.4, 1);
                drawArrow(context, arrow, "rgba(215, 129, 42, 0.94)", lineWidth, 1);
            }

            return canvas;
        }

        function createArrowErasedSurface(sourceCanvas, arrows) {
            const { width, height } = sourceCanvas;
            const sourceContext = sourceCanvas.getContext("2d", { willReadFrequently: true });
            const sourceData = sourceContext.getImageData(0, 0, width, height);
            const { canvas, context } = createCanvasSurface(width, height);
            context.drawImage(sourceCanvas, 0, 0);

            for (const arrow of arrows) {
                const lineWidth = Math.max(16, width / 36);
                const sampleBox = {
                    x: Math.min(arrow.x1, arrow.x2) - lineWidth,
                    y: Math.min(arrow.y1, arrow.y2) - lineWidth,
                    width: Math.abs(arrow.x2 - arrow.x1) + lineWidth * 2,
                    height: Math.abs(arrow.y2 - arrow.y1) + lineWidth * 2,
                };
                const color = sampleAverageColor(
                    sourceData,
                    sampleBox.x,
                    sampleBox.y,
                    sampleBox.width,
                    sampleBox.height
                );
                drawArrow(
                    context,
                    arrow,
                    `rgba(${color.red}, ${color.green}, ${color.blue}, 0.76)`,
                    lineWidth * 1.3,
                    1
                );
                drawArrow(
                    context,
                    arrow,
                    `rgba(${color.red}, ${color.green}, ${color.blue}, 0.98)`,
                    lineWidth,
                    1
                );
            }

            return canvas;
        }

        function createSamOverlayCanvas(sourceCanvas) {
            const { width, height } = sourceCanvas;
            const sourceContext = sourceCanvas.getContext("2d", { willReadFrequently: true });
            const sourceData = sourceContext.getImageData(0, 0, width, height);
            const gray = extractGrayMap(sourceData);
            const edges = computeEdgeMagnitudes(gray, width, height);
            const { canvas, context } = createCanvasSurface(width, height);
            const palette = [
                [76, 137, 245],
                [215, 129, 42],
                [84, 168, 112],
                [227, 105, 164],
            ];
            const cellWidth = Math.max(24, Math.round(width / 16));
            const cellHeight = Math.max(22, Math.round(height / 14));

            for (let y = 0; y < height; y += cellHeight) {
                for (let x = 0; x < width; x += cellWidth) {
                    let graySum = 0;
                    let edgeSum = 0;
                    let count = 0;
                    for (let row = y; row < Math.min(height, y + cellHeight); row += 3) {
                        for (let col = x; col < Math.min(width, x + cellWidth); col += 3) {
                            const index = row * width + col;
                            graySum += gray[index];
                            edgeSum += edges[index];
                            count += 1;
                        }
                    }
                    const darkness = 1 - (graySum / Math.max(1, count) / 255);
                    const structure = (edgeSum / Math.max(1, count)) / 180;
                    const score = darkness * 0.62 + structure * 0.58;
                    if (score < 0.28) {
                        continue;
                    }

                    const [red, green, blue] = palette[Math.abs((Math.floor(x / cellWidth) + Math.floor(y / cellHeight))) % palette.length];
                    const alpha = Math.min(0.34, 0.12 + score * 0.24);
                    context.save();
                    context.fillStyle = `rgba(${red}, ${green}, ${blue}, ${alpha})`;
                    fillRoundedRect(
                        context,
                        x + 2,
                        y + 2,
                        Math.max(8, Math.min(cellWidth - 4, width - x - 4)),
                        Math.max(8, Math.min(cellHeight - 4, height - y - 4)),
                        Math.max(8, Math.min(cellWidth, cellHeight) * 0.24)
                    );
                    if (score > 0.42) {
                        context.strokeStyle = `rgba(${red}, ${green}, ${blue}, ${Math.min(0.72, alpha + 0.24)})`;
                        context.lineWidth = Math.max(1.5, width / 480);
                        strokeRoundedRect(
                            context,
                            x + 2.5,
                            y + 2.5,
                            Math.max(8, Math.min(cellWidth - 5, width - x - 5)),
                            Math.max(8, Math.min(cellHeight - 5, height - y - 5)),
                            Math.max(8, Math.min(cellWidth, cellHeight) * 0.22)
                        );
                    }
                    context.restore();
                }
            }

            return canvas;
        }

        function createMergeOverlayCanvas(sourceCanvas, ocrOverlayCanvas, arrowOverlayCanvas, samOverlayCanvas, imageWidth, imageHeight) {
            const { width, height } = sourceCanvas;
            const { canvas, context } = createCanvasSurface(width, height);
            context.drawImage(samOverlayCanvas, 0, 0);
            context.save();
            context.globalAlpha = 0.16;
            context.drawImage(ocrOverlayCanvas, 0, 0);
            context.restore();
            context.save();
            context.globalAlpha = 0.28;
            context.drawImage(arrowOverlayCanvas, 0, 0);
            context.restore();

            const margin = Math.max(16, Math.round(Math.min(width, height) * 0.05));
            context.strokeStyle = "rgba(255, 253, 249, 0.24)";
            context.lineWidth = Math.max(1.5, width / 540);
            const gridX = Math.max(40, Math.round(width / 8));
            const gridY = Math.max(36, Math.round(height / 7));
            for (let x = gridX; x < width; x += gridX) {
                context.beginPath();
                context.moveTo(x + 0.5, margin);
                context.lineTo(x + 0.5, height - margin);
                context.stroke();
            }
            for (let y = gridY; y < height; y += gridY) {
                context.beginPath();
                context.moveTo(margin, y + 0.5);
                context.lineTo(width - margin, y + 0.5);
                context.stroke();
            }

            context.strokeStyle = "rgba(215, 129, 42, 0.92)";
            context.lineWidth = Math.max(2, width / 340);
            strokeRoundedRect(context, margin, margin, width - margin * 2, height - margin * 2, Math.max(12, margin * 0.6));

            const badgeWidth = Math.min(Math.max(170, Math.round(width * 0.36)), width - margin * 2);
            const badgeHeight = Math.max(22, Math.round(height * 0.055));
            const badgeX = Math.max(margin, width - badgeWidth - 18);
            const badgeY = Math.max(margin, height - badgeHeight - 18);
            context.fillStyle = "rgba(18, 25, 35, 0.72)";
            fillRoundedRect(context, badgeX, badgeY, badgeWidth, badgeHeight, badgeHeight / 2);
            context.fillStyle = "#fffdf9";
            context.font = `600 ${Math.max(12, Math.round(width / 56))}px ui-monospace, SFMono-Regular, Menlo, monospace`;
            context.textAlign = "left";
            context.fillText(`viewBox 0 0 ${imageWidth} ${imageHeight}`, badgeX + 12, badgeY + badgeHeight - 6);
            return canvas;
        }

        function easeOutCubic(value) {
            return 1 - ((1 - value) ** 3);
        }

        function animateValue(durationMs, onUpdate) {
            return new Promise((resolve) => {
                const startTime = performance.now();

                const frame = (now) => {
                    const progress = Math.min(1, (now - startTime) / durationMs);
                    onUpdate(progress);
                    if (progress < 1) {
                        window.requestAnimationFrame(frame);
                        return;
                    }
                    resolve();
                };

                window.requestAnimationFrame(frame);
            });
        }

        function drawSweepHighlight(context, width, height, progress, colorStops) {
            const centerX = (-0.3 + progress * 1.6) * width;
            const highlightWidth = Math.max(48, width * 0.14);
            const gradient = context.createLinearGradient(
                centerX - highlightWidth,
                0,
                centerX + highlightWidth,
                0
            );
            gradient.addColorStop(0, colorStops[0]);
            gradient.addColorStop(0.5, colorStops[1]);
            gradient.addColorStop(1, colorStops[0]);
            context.fillStyle = gradient;
            context.fillRect(0, 0, width, height);
        }

        function drawScaledSurface(context, surface, alpha = 1) {
            context.save();
            context.globalAlpha = alpha;
            context.drawImage(surface, 0, 0, context.canvas.width, context.canvas.height);
            context.restore();
        }

        function drawRevealSurface(context, surface, progress, alpha = 1) {
            context.save();
            context.beginPath();
            context.rect(0, 0, context.canvas.width * progress, context.canvas.height);
            context.clip();
            drawScaledSurface(context, surface, alpha);
            context.restore();
        }

        function drawFocusMask(context, boxes, alpha = 0.18) {
            if (!boxes.length) {
                return;
            }

            context.save();
            context.fillStyle = `rgba(18, 25, 35, ${alpha})`;
            context.fillRect(0, 0, context.canvas.width, context.canvas.height);
            context.globalCompositeOperation = "destination-out";
            boxes.forEach((box) => {
                fillRoundedRect(
                    context,
                    box.x,
                    box.y,
                    box.width,
                    box.height,
                    Math.max(10, Math.min(box.height * 0.24, box.width * 0.2))
                );
            });
            context.restore();
        }

        function drawStageBadge(context, x, y, text, fillStyle = "rgba(18, 25, 35, 0.84)") {
            context.save();
            const fontSize = Math.max(11, Math.round(context.canvas.width / 72));
            context.font = `700 ${fontSize}px ui-monospace, SFMono-Regular, Menlo, monospace`;
            const metrics = context.measureText(text);
            const width = Math.max(44, metrics.width + 18);
            const height = Math.max(22, fontSize + 10);
            fillRoundedRect(context, x, y, width, height, height / 2);
            context.fillStyle = fillStyle;
            fillRoundedRect(context, x, y, width, height, height / 2);
            context.fillStyle = "#fffdf9";
            context.textAlign = "left";
            context.textBaseline = "middle";
            context.fillText(text, x + 9, y + height / 2 + 0.5);
            context.restore();
        }

function drawTextEraseTransition(context, surfaces, progress) {
            const transitions = [];
            surfaces.textBoxes.forEach((box, index) => {
                const local = clamp(progress * 1.38 - index * 0.11, 0, 1);
                if (local <= 0) {
                    return;
                }

                const expandX = Math.max(8, box.width * 0.05);
                const expandY = Math.max(6, box.height * 0.08);
                const x = box.x - expandX;
                const y = box.y - expandY;
                const width = box.width + expandX * 2;
                const height = box.height + expandY * 2;
                const radius = Math.max(10, height * 0.24);
                const revealWidth = Math.max(width * 0.08, width * local);
                const wipeX = x + revealWidth;
                const beamHalf = Math.max(18, width * 0.16);
                transitions.push({
                    local,
                    x,
                    y,
                    width,
                    height,
                    radius,
                    revealWidth,
                    wipeX,
                    beamHalf,
                });
            });

            drawFocusMask(
                context,
                transitions.map((item) => ({
                    x: item.x,
                    y: item.y,
                    width: item.width,
                    height: item.height,
                })),
                0.24
            );

            transitions.forEach(({ local, x, y, width, height, radius, revealWidth, wipeX, beamHalf }, index) => {
                const remainderX = x + revealWidth;
                const remainderWidth = Math.max(0, width - revealWidth);

                context.save();
                roundedRectPath(context, x, y, width, height, radius);
                context.clip();
                if (remainderWidth > 0) {
                    context.fillStyle = `rgba(215, 129, 42, ${0.1 + (1 - local) * 0.16})`;
                    context.fillRect(remainderX, y, remainderWidth, height);
                }
                context.restore();

                context.save();
                roundedRectPath(context, x, y, width, height, radius);
                context.clip();
                context.beginPath();
                context.rect(x, y, revealWidth, height);
                context.clip();
                drawScaledSurface(context, surfaces.textErased, 1);
                context.restore();

                context.save();
                roundedRectPath(context, x, y, width, height, radius);
                context.clip();
                const wipeGradient = context.createLinearGradient(wipeX - beamHalf, 0, wipeX + beamHalf, 0);
                wipeGradient.addColorStop(0, "rgba(255, 248, 236, 0)");
                wipeGradient.addColorStop(0.42, "rgba(255, 248, 236, 0.24)");
                wipeGradient.addColorStop(0.5, "rgba(255, 255, 255, 0.96)");
                wipeGradient.addColorStop(0.58, "rgba(255, 248, 236, 0.24)");
                wipeGradient.addColorStop(1, "rgba(255, 248, 236, 0)");
                context.fillStyle = wipeGradient;
                context.fillRect(x - 4, y - 2, width + 8, height + 4);
                context.restore();

                context.save();
                context.strokeStyle = `rgba(255, 255, 255, ${0.4 + local * 0.56})`;
                context.lineWidth = Math.max(2.5, height / 7);
                context.beginPath();
                context.moveTo(wipeX, y - 4);
                context.lineTo(wipeX, y + height + 4);
                context.stroke();
                context.restore();

                context.save();
                context.strokeStyle = `rgba(215, 129, 42, ${0.2 + (1 - local) * 0.55})`;
                context.lineWidth = Math.max(1.5, height / 14);
                context.setLineDash([Math.max(8, width / 8), Math.max(6, width / 16)]);
                strokeRoundedRect(context, x, y, width, height, radius);
                context.restore();

                if (local > 0.18) {
                    drawStageBadge(
                        context,
                        x,
                        Math.max(0, y - 26),
                        `erase ${index + 1}`,
                        "rgba(160, 74, 48, 0.86)"
                    );
                }
            });
        }

        function drawArrowHighlights(context, arrows, progress) {
            arrows.forEach((arrow, index) => {
                const local = clamp(progress * 1.35 - index * 0.14, 0, 1);
                if (local <= 0) {
                    return;
                }
                const box = bboxToBox(arrow.bbox);
                context.save();
                context.strokeStyle = `rgba(84, 168, 112, ${0.18 + local * 0.22})`;
                context.lineWidth = Math.max(1.5, Math.min(box.width, box.height) / 14);
                strokeRoundedRect(context, box.x, box.y, box.width, box.height, Math.max(10, Math.min(box.width, box.height) * 0.2));
                context.restore();
            });
        }

function drawArrowEraseTransition(context, surfaces, progress) {
            const transitions = [];
            surfaces.arrowSegments.forEach((arrow, index) => {
                const local = clamp(progress * 1.35 - index * 0.16, 0, 1);
                if (local <= 0) {
                    return;
                }

                const box = bboxToBox(arrow.bbox);
                const padX = Math.max(8, context.canvas.width / 70);
                const padY = Math.max(8, context.canvas.height / 70);
                const x = box.x - padX;
                const y = box.y - padY;
                const width = box.width + padX * 2;
                const height = box.height + padY * 2;
                const revealWidth = Math.max(width * 0.12, width * local);
                const wipeX = x + revealWidth;
                const beamHalf = Math.max(18, width * 0.09);
                transitions.push({
                    arrow,
                    local,
                    x,
                    y,
                    width,
                    height,
                    revealWidth,
                    wipeX,
                    beamHalf,
                });
            });

            drawFocusMask(
                context,
                transitions.map((item) => ({
                    x: item.x,
                    y: item.y,
                    width: item.width,
                    height: item.height,
                })),
                0.1
            );

            transitions.forEach(({ arrow, local, x, y, width, height, revealWidth, wipeX, beamHalf }) => {
                const radius = Math.max(8, Math.min(width, height) * 0.14);
                const remainderX = x + revealWidth;
                const remainderWidth = Math.max(0, width - revealWidth);

                context.save();
                roundedRectPath(context, x, y, width, height, radius);
                context.clip();
                drawScaledSurface(context, surfaces.arrows, 1);
                if (remainderWidth > 0) {
                    context.fillStyle = `rgba(37, 97, 124, ${0.03 + (1 - local) * 0.06})`;
                    context.fillRect(remainderX, y, remainderWidth, height);
                }
                context.restore();

                context.save();
                roundedRectPath(context, x, y, width, height, radius);
                context.clip();
                context.beginPath();
                context.rect(x, y, revealWidth, height);
                context.clip();
                drawScaledSurface(context, surfaces.arrowErased, 1);
                const beamGradient = context.createLinearGradient(wipeX - beamHalf, 0, wipeX + beamHalf, 0);
                beamGradient.addColorStop(0, "rgba(224, 247, 255, 0)");
                beamGradient.addColorStop(0.46, "rgba(224, 247, 255, 0.16)");
                beamGradient.addColorStop(0.5, "rgba(255, 255, 255, 0.8)");
                beamGradient.addColorStop(0.54, "rgba(224, 247, 255, 0.16)");
                beamGradient.addColorStop(1, "rgba(224, 247, 255, 0)");
                context.fillStyle = beamGradient;
                context.fillRect(x - 6, y - 6, width + 12, height + 12);
                context.restore();

                context.save();
                context.strokeStyle = `rgba(255, 255, 255, ${0.28 + local * 0.24})`;
                context.lineWidth = Math.max(1.5, height / 10);
                context.beginPath();
                context.moveTo(wipeX, y - 4);
                context.lineTo(wipeX, y + height + 4);
                context.stroke();
                context.restore();
            });
        }

        function drawSamTransition(context, surfaces, progress) {
            const transitions = [];
            surfaces.samComponents.forEach((component, index) => {
                const local = clamp(progress * 1.34 - index * 0.1, 0, 1);
                if (local <= 0) {
                    return;
                }
                const box = component.bbox;
                const expandX = Math.max(8, box.width * 0.04);
                const expandY = Math.max(8, box.height * 0.05);
                transitions.push({
