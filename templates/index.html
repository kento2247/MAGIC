                    id: component.id || `s${index + 1}`,
                    local,
                    x: box.x - expandX,
                    y: box.y - expandY,
                    width: box.width + expandX * 2,
                    height: box.height + expandY * 2,
                });
            });

            drawFocusMask(
                context,
                transitions.map((item) => ({
                    x: item.x,
                    y: item.y,
                    width: item.width,
                    height: item.height,
                })),
                0.2
            );

            transitions.forEach(({ id, local, x, y, width, height }, index) => {
                const radius = Math.max(12, Math.min(width, height) * 0.16);
                const revealWidth = Math.max(width * 0.08, width * local);
                const scanX = x - 10 + (width + 20) * local;
                const beamHalf = Math.max(18, width * 0.12);

                context.save();
                roundedRectPath(context, x, y, width, height, radius);
                context.clip();
                context.fillStyle = `rgba(84, 168, 112, ${0.08 + local * 0.14})`;
                context.fillRect(x, y, width, height);
                context.beginPath();
                context.rect(x, y, revealWidth, height);
                context.clip();
                drawScaledSurface(context, surfaces.sam, 1);
                const beamGradient = context.createLinearGradient(scanX - beamHalf, 0, scanX + beamHalf, 0);
                beamGradient.addColorStop(0, "rgba(182, 233, 192, 0)");
                beamGradient.addColorStop(0.45, "rgba(182, 233, 192, 0.34)");
                beamGradient.addColorStop(0.5, "rgba(244, 255, 248, 0.92)");
                beamGradient.addColorStop(0.55, "rgba(182, 233, 192, 0.34)");
                beamGradient.addColorStop(1, "rgba(182, 233, 192, 0)");
                context.fillStyle = beamGradient;
                context.fillRect(x - 6, y - 4, width + 12, height + 8);
                context.restore();

                context.save();
                context.strokeStyle = `rgba(244, 255, 248, ${0.24 + local * 0.44})`;
                context.lineWidth = Math.max(2.2, Math.min(width, height) / 14);
                strokeRoundedRect(context, x, y, width, height, radius);
                context.restore();

                context.save();
                context.strokeStyle = `rgba(84, 168, 112, ${0.42 + local * 0.4})`;
                context.lineWidth = Math.max(2, Math.min(width, height) / 18);
                context.setLineDash([Math.max(10, width / 7), Math.max(8, width / 14)]);
                strokeRoundedRect(context, x, y, width, height, radius);
                context.restore();

                context.save();
                context.fillStyle = "rgba(244, 255, 248, 0.96)";
                context.beginPath();
                context.arc(scanX, y + height / 2, Math.max(10, Math.min(width, height) / 10), 0, Math.PI * 2);
                context.fill();
                context.restore();

                if (local > 0.18) {
                    drawStageBadge(
                        context,
                        x,
                        Math.max(0, y - 26),
                        id,
                        index % 2 === 0 ? "rgba(84, 168, 112, 0.9)" : "rgba(54, 122, 201, 0.9)"
                    );
                }
            });
        }

        function renderExportOverlayFrame(stageIndex, stageProgress, surfaces) {
            const canvas = elements.exportOverlayCanvas;
            const context = canvas.getContext("2d");
            const width = canvas.width;
            const height = canvas.height;
            const eased = easeOutCubic(stageProgress);

            context.clearRect(0, 0, width, height);
            drawScaledSurface(context, surfaces.raster, 1);
            context.fillStyle = "rgba(18, 25, 35, 0.05)";
            context.fillRect(0, 0, width, height);

            if (stageIndex === 0) {
                drawScaledSurface(context, surfaces.ocr, 0.28 + eased * 0.92);
                drawSweepHighlight(context, width, height, stageProgress, [
                    "rgba(255, 253, 249, 0)",
                    "rgba(255, 253, 249, 0.28)",
                ]);
                return;
            }

            if (stageIndex === 1) {
                drawScaledSurface(context, surfaces.ocr, 0.42);
                drawTextEraseTransition(context, surfaces, eased);
                drawSweepHighlight(context, width, height, stageProgress, [
                    "rgba(215, 129, 42, 0)",
                    "rgba(215, 129, 42, 0.28)",
                ]);
                return;
            }

            if (stageIndex === 2) {
                drawScaledSurface(context, surfaces.textErased, 1);
                drawScaledSurface(context, surfaces.arrows, 0.24 + eased * 0.76);
                drawSweepHighlight(context, width, height, stageProgress, [
                    "rgba(24, 49, 79, 0)",
                    "rgba(24, 49, 79, 0.24)",
                ]);
                return;
            }

            if (stageIndex === 3) {
                drawScaledSurface(context, surfaces.textErased, 1);
                drawScaledSurface(context, surfaces.arrows, Math.max(0, 0.42 - eased * 0.42));
                drawArrowEraseTransition(context, surfaces, eased);
                drawSweepHighlight(context, width, height, stageProgress, [
                    "rgba(255, 253, 249, 0)",
                    "rgba(255, 253, 249, 0.26)",
                ]);
                return;
            }

            if (stageIndex === 4) {
                drawScaledSurface(context, surfaces.arrowErased, 1);
                drawSamTransition(context, surfaces, eased);
                drawSweepHighlight(context, width, height, stageProgress, [
                    "rgba(84, 168, 112, 0)",
                    "rgba(84, 168, 112, 0.28)",
                ]);
                return;
            }

            drawScaledSurface(context, surfaces.arrowErased, 1);
            drawScaledSurface(context, surfaces.sam, 0.22);
            drawScaledSurface(context, surfaces.merge, 0.14 + eased * 0.92);
            drawSweepHighlight(context, width, height, stageProgress, [
                "rgba(255, 253, 249, 0)",
                "rgba(255, 253, 249, 0.28)",
            ]);
        }

        async function animateExportStage(stageIndex, surfaces, exportWidth, exportHeight) {
            const metricText = [
                `OCR ${surfaces.textBoxes.length} boxes`,
                `Erase text ${surfaces.textBoxes.length} regions`,
                `Detect arrows ${surfaces.arrowSegments.length} paths`,
                `Erase arrows ${surfaces.arrowSegments.length} paths`,
                `SAM ${surfaces.arrowSegments.length + surfaces.textBoxes.length} prompts`,
                `Merge ${exportWidth}x${exportHeight}`,
            ][stageIndex];
            const stageDurations = [1500, 2400, 1600, 2400, 2300, 1600];
            const stageMeta = surfaces.stageMeta?.[stageIndex] || {};

            elements.exportOverlayLabel.textContent = stageMeta.label || EXPORT_STAGE_LABELS[stageIndex];
            elements.exportOverlayMetric.textContent = stageMeta.metric || metricText;
            elements.exportProgressSteps[stageIndex].dataset.state = "active";
            await animateValue(stageDurations[stageIndex], (progress) => {
                renderExportOverlayFrame(stageIndex, progress, surfaces);
            });
            elements.exportProgressSteps[stageIndex].dataset.state = "done";
        }

        async function loadExportImage(source) {
            return new Promise((resolve, reject) => {
                const image = new Image();
                image.onload = () => resolve(image);
                image.onerror = () => reject(new Error("エクスポート用の画像を読み込めませんでした。"));
                image.src = source;
            });
        }

        function bboxToBox(bbox) {
            if (!Array.isArray(bbox) || bbox.length !== 4) {
                return null;
            }
            const [x1, y1, x2, y2] = bbox.map((value) => Number(value) || 0);
            return {
                x: x1,
                y: y1,
                width: Math.max(1, x2 - x1),
                height: Math.max(1, y2 - y1),
            };
        }

        function normalizeArrowTrace(arrows) {
            return (arrows || []).map((arrow) => {
                const bbox = Array.isArray(arrow.bbox) && arrow.bbox.length === 4
                    ? arrow.bbox.map((value) => Number(value) || 0)
                    : [Number(arrow.x1) || 0, Number(arrow.y1) || 0, Number(arrow.x2) || 0, Number(arrow.y2) || 0];
                const [bx1, by1, bx2, by2] = bbox;
                const orientation = arrow.orientation || ((bx2 - bx1) >= (by2 - by1) ? "horizontal" : "vertical");
                if (orientation === "horizontal") {
                    const centerY = Math.round((by1 + by2) / 2);
                    return {
                        ...arrow,
                        bbox,
                        orientation,
                        x1: Number.isFinite(Number(arrow.x1)) ? Number(arrow.x1) : bx1,
                        y1: Number.isFinite(Number(arrow.y1)) ? Number(arrow.y1) : centerY,
                        x2: Number.isFinite(Number(arrow.x2)) ? Number(arrow.x2) : bx2,
                        y2: Number.isFinite(Number(arrow.y2)) ? Number(arrow.y2) : centerY,
                    };
                }
                const centerX = Math.round((bx1 + bx2) / 2);
                return {
                    ...arrow,
                    bbox,
                    orientation,
                    x1: Number.isFinite(Number(arrow.x1)) ? Number(arrow.x1) : centerX,
                    y1: Number.isFinite(Number(arrow.y1)) ? Number(arrow.y1) : by1,
                    x2: Number.isFinite(Number(arrow.x2)) ? Number(arrow.x2) : centerX,
                    y2: Number.isFinite(Number(arrow.y2)) ? Number(arrow.y2) : by2,
                };
            });
        }

        async function buildExportSurfacesFromTrace(tracePayload) {
            const stageEntries = await Promise.all((tracePayload.stages || []).map(async (stage) => ({
                ...stage,
                image: await loadExportImage(stage.image_data_url),
            })));

            const stageMap = Object.fromEntries(stageEntries.map((stage) => [stage.key, stage]));
            const raster = await loadExportImage(state.generatedImageDataUrl || state.generatedImageSrc);
            const ocrStage = stageMap.ocr || stageEntries[0];
            const eraseTextStage = stageMap.erase_text || stageEntries[1] || ocrStage;
            const detectArrowsStage = stageMap.detect_arrows || stageEntries[2] || eraseTextStage;
            const eraseArrowsStage = stageMap.erase_arrows || stageEntries[3] || detectArrowsStage;
            const samStage = stageMap.sam || stageEntries[4] || eraseArrowsStage;
            const mergeStage = stageMap.merge || stageEntries[5] || samStage;
            const sourceWidth = Number(tracePayload.width) || raster.naturalWidth || state.generatedImageWidth || 1024;
            const sourceHeight = Number(tracePayload.height) || raster.naturalHeight || state.generatedImageHeight || 768;
            const canvasWidth = elements.exportOverlayCanvas.width || sourceWidth;
            const canvasHeight = elements.exportOverlayCanvas.height || sourceHeight;
            const scaleX = canvasWidth / sourceWidth;
            const scaleY = canvasHeight / sourceHeight;

            return {
                raster,
                ocr: ocrStage.image,
                textErased: eraseTextStage.image,
                arrows: detectArrowsStage.image,
                arrowErased: eraseArrowsStage.image,
                sam: samStage.image,
                merge: mergeStage.image,
                textBoxes: ((eraseTextStage.texts || ocrStage.texts || []).map((text) => bboxToBox(text.bbox)).filter(Boolean)).map((box) => ({
                    x: box.x * scaleX,
                    y: box.y * scaleY,
                    width: box.width * scaleX,
                    height: box.height * scaleY,
                })),
                arrowSegments: normalizeArrowTrace(eraseArrowsStage.arrows || detectArrowsStage.arrows || []).map((arrow) => ({
                    ...arrow,
                    bbox: [
                        arrow.bbox[0] * scaleX,
                        arrow.bbox[1] * scaleY,
                        arrow.bbox[2] * scaleX,
                        arrow.bbox[3] * scaleY,
                    ],
                    x1: arrow.x1 * scaleX,
                    y1: arrow.y1 * scaleY,
                    x2: arrow.x2 * scaleX,
                    y2: arrow.y2 * scaleY,
                })),
                samComponents: ((samStage.components || []).filter((component) => Array.isArray(component.bbox) && component.bbox.length === 4)).map((component) => {
                    const box = bboxToBox(component.bbox);
                    return {
                        id: component.id,
                        bbox: {
                            x: box.x * scaleX,
                            y: box.y * scaleY,
                            width: box.width * scaleX,
                            height: box.height * scaleY,
                        },
                    };
                }),
                stageMeta: stageEntries.map((stage) => ({
                    label: stage.label,
                    metric: stage.metric,
                })),
                exportWidth: Number(tracePayload.width) || state.generatedImageWidth || 1024,
                exportHeight: Number(tracePayload.height) || state.generatedImageHeight || 768,
                warnings: tracePayload.warnings || [],
            };
        }

        function downloadSvgText(svgText, filename) {
            const blob = new Blob([svgText], { type: "image/svg+xml;charset=utf-8" });
            const downloadUrl = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.href = downloadUrl;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            link.remove();
            URL.revokeObjectURL(downloadUrl);
        }

        function showModalResult(imageSrc, imageDataUrl) {
            if (!imageSrc) {
                showModalError("生成画像を表示できませんでした。");
                return;
            }

            openGenerationModal();
            state.generatedImageSrc = imageSrc;
            state.generatedImageDataUrl = imageDataUrl || (imageSrc.startsWith("data:") ? imageSrc : "");
            state.generatedImageWidth = 0;
            state.generatedImageHeight = 0;
            state.exportInProgress = false;
            elements.modalLoading.hidden = true;
            elements.modalFeedback.hidden = true;
            elements.modalFeedback.textContent = "";
            elements.modalResult.hidden = false;
            elements.saveSvgButton.disabled = false;
            resetExportVisualization();

            const image = elements.modalImage;
            image.onload = () => {
                updateGeneratedImageSize();
                syncExportOverlayCanvasSize();
                image.onload = null;
                image.onerror = null;
            };
            image.onerror = () => {
                image.onload = null;
                image.onerror = null;
                state.generatedImageDataUrl = "";
                state.generatedImageWidth = 0;
                state.generatedImageHeight = 0;
                showModalError("生成画像を表示できませんでした。");
            };
            image.src = imageSrc;

            if (image.complete && image.naturalWidth > 0) {
                updateGeneratedImageSize();
                syncExportOverlayCanvasSize();
                image.onload = null;
                image.onerror = null;
            }
        }

        function escapeSvgAttribute(text) {
            return String(text)
                .replaceAll("&", "&amp;")
                .replaceAll('"', "&quot;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;");
        }

        async function exportGeneratedSvg() {
            if (!state.generatedImageDataUrl || state.exportInProgress) {
                return;
            }

            state.exportInProgress = true;
            elements.saveSvgButton.disabled = true;
            elements.exportOverlay.hidden = false;
            try {
                syncExportOverlayCanvasSize();
                elements.exportProgressSteps.forEach((step) => {
                    step.dataset.state = "idle";
                });
                elements.exportOverlayLabel.textContent = "PingToSVG: サーバーで中間結果を生成しています。";
                elements.exportOverlayMetric.textContent = "running OCR / arrow detection / SAM";

                const response = await fetch("/api/export-svg", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({
                        image_data_url: state.generatedImageDataUrl,
                        filename_base: state.sampleName || "generated_figure",
                    }),
                });
                const payload = await response.json();
                if (!response.ok) {
                    throw new Error(payload.error || "SVG export failed.");
                }

                const surfaces = await buildExportSurfacesFromTrace(payload);

                for (const [index] of EXPORT_STAGE_LABELS.entries()) {
                    await animateExportStage(index, surfaces, surfaces.exportWidth, surfaces.exportHeight);
                    await sleep(180);
                }

                downloadSvgText(payload.svg_text, payload.filename || `${state.sampleName || "generated_figure"}.svg`);
                elements.exportOverlayLabel.textContent = "SVG export complete";
                elements.exportOverlayMetric.textContent = surfaces.warnings.length > 0
                    ? surfaces.warnings[0]
                    : (payload.filename || `${state.sampleName || "generated_figure"}.svg ready`);
                renderExportOverlayFrame(5, 1, surfaces);
                await sleep(520);
                resetExportVisualization();
            } catch (error) {
                elements.exportOverlayLabel.textContent = "SVG export failed";
                elements.exportOverlayMetric.textContent = error.message;
                await sleep(900);
                resetExportVisualization();
            } finally {
                state.exportInProgress = false;
                elements.saveSvgButton.disabled = false;
            }
        }

        function buildLoadedAssistantMessage(data) {
            const parts = [
                "説明は図示可能な粒度です。右側の要約とキャプションを必要に応じて編集してください。"
            ];

            if (data.caption) {
                parts.push("", "図キャプション:", data.caption);
            }

            parts.push("", "必要であれば追加説明を続けて入力してください。");
            return parts.join("\n");
        }

        function resetNewChat() {
            state.mode = "new";
            state.sampleName = "";
            state.compiledInstruction = "";
            state.assistantActivity = "";
            state.messages = [
                {
                    role: "assistant",
                    text: "論文の手法説明を入力してください。図示に必要な情報が不足していれば、追加で質問します。",
                },
            ];
            elements.summaryEditor.value = "";
            elements.captionEditor.value = "";
            elements.chatInput.value = "";
            if (elements.samplePreview) {
                elements.samplePreview.hidden = true;
            }
            if (elements.samplePreviewImage) {
                elements.samplePreviewImage.removeAttribute("src");
            }
            if (elements.samplePreviewLinks) {
                elements.samplePreviewLinks.innerHTML = "";
            }
            clearGeneratedImage();
            closeGenerationModal();
            elements.sampleSelect.value = "__new__";
            elements.chatMeta.textContent = "手法説明の入力と追加回答";
            renderMessages();
            syncDraftMeta();
            syncGenerateHint();
            setStatus("待機中", "idle", "新しい手法説明を受け付けています。");
        }

        async function loadSample(sampleName) {
            if (!sampleName) {
                return;
            }

            setBusy(true);
            setStatus("読込中", "working", "内容を取得しています。");

            try {
                const response = await fetch(`/api/demo-sample?name=${encodeURIComponent(sampleName)}`);
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || "内容を読み込めませんでした。");
                }

                state.mode = "existing";
                state.sampleName = data.name;
                state.compiledInstruction = data.description || "";
                clearAssistantActivity();
                state.messages = [
                    {
                        role: "user",
                        text: data.description || "（既存の入力はありません）",
                    },
                    {
                        role: "assistant",
                        text: buildLoadedAssistantMessage(data),
                    },
                ];
                elements.summaryEditor.value = data.description || "";
                elements.captionEditor.value = data.caption || "";
                elements.chatInput.value = "";
                clearGeneratedImage();
                closeGenerationModal();
                elements.sampleSelect.value = data.name;
                elements.chatMeta.textContent = "手法説明の入力と追加回答";
                if (elements.samplePreview) {
                    elements.samplePreview.hidden = false;
                }
                if (elements.samplePreviewTitle) {
                    elements.samplePreviewTitle.textContent = data.name;
                }
                if (elements.samplePreviewMeta) {
                    elements.samplePreviewMeta.textContent = "demo_sample/ から既存の説明とキャプションを反映しました。";
                }
                if (elements.samplePreviewLinks) {
                    elements.samplePreviewLinks.innerHTML = "";
                }

                if (elements.samplePreviewImage) {
                    if (data.image_url) {
                        elements.samplePreviewImage.src = data.image_url;
                        elements.samplePreviewImage.alt = `${data.name} preview`;
                        if (elements.samplePreviewLinks) {
                            elements.samplePreviewLinks.innerHTML += `<a href="${data.image_url}" target="_blank" rel="noreferrer">PNG を開く</a>`;
                        }
                    } else {
                        elements.samplePreviewImage.removeAttribute("src");
                    }
                }

                if (data.svg_url && elements.samplePreviewLinks) {
                    const separator = elements.samplePreviewLinks.innerHTML ? " / " : "";
                    elements.samplePreviewLinks.innerHTML += `${separator}<a href="${data.svg_url}" target="_blank" rel="noreferrer">SVG を開く</a>`;
                }

                renderMessages();
                syncDraftMeta();
                syncGenerateHint();
                setStatus("準備完了", "ready", "編集可能な状態で読み込みました。");
            } catch (error) {
                setStatus("読込失敗", "needs-info", error.message);
                pushMessage("assistant", `チャットの読込に失敗しました: ${error.message}`);
            } finally {
                setBusy(false);
            }
        }

        async function generateFigure() {
            const description = elements.summaryEditor.value.trim() || state.compiledInstruction.trim();
            const caption = elements.captionEditor.value.trim();

            if (!description) {
                pushMessage("assistant", "図生成の前に、整理された説明を右側に用意してください。");
                return;
            }
            if (!caption) {
                pushMessage("assistant", "図生成の前に、図キャプションを入力してください。");
                return;
            }

            setBusy(true);
            setAssistantActivity("Assistant が図を生成しています。");
            clearGeneratedImage();
            showModalLoading("図を生成しています。しばらくお待ちください。");
            setStatus(
                "生成中",
                "working",
                "PaperBanana を呼び出して図を生成しています。"
            );

            try {
                const response = await fetch("/api/generate", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({
                        description,
                        caption,
                        mode: state.mode,
                        sample_name: state.sampleName,
                    }),
                });

                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.error || "図生成に失敗しました。");
                }

                clearAssistantActivity();
                showModalResult(data.image_url || data.image_data_url, data.image_data_url);
                if (elements.generationMeta) {
                    elements.generationMeta.textContent = "ポップアップに生成結果を表示しています。";
                }

                pushMessage(
                    "assistant",
                    "PaperBanana による図生成を実行しました。"
                );
                setStatus(
                    "生成完了",
                    "ready",
                    "PaperBanana の生成結果をポップアップに表示しました。"
                );
            } catch (error) {
                clearAssistantActivity();
                pushMessage("assistant", `図生成でエラーが発生しました: ${error.message}`);
                showModalError(error.message);
                setStatus("生成失敗", "needs-info", error.message);
            } finally {
                clearAssistantActivity();
                setBusy(false);
            }
        }

        async function submitInstruction() {
            const currentMessage = elements.chatInput.value.trim();
            if (!currentMessage || state.busy) {
                return;
            }

            pushMessage("user", currentMessage);
            state.compiledInstruction = [state.compiledInstruction, currentMessage]
                .filter((value) => value && value.trim())
                .join("\n\n");
            elements.chatInput.value = "";
            syncDraftMeta();

            setBusy(true);
            setAssistantActivity("解析しています。");
            setStatus("解析中", "working", "説明の十分性を判定しています。");

            try {
                const response = await fetch("/api/review", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({
                        instruction: state.compiledInstruction,
                        mode: state.mode,
                        sample_name: state.sampleName,
                    }),
                });

                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.error || "判定に失敗しました。");
                }

                clearAssistantActivity();
                pushMessage("assistant", data.assistant_message || "判定結果を受け取りました。");

                if (data.markdown_text) {
                    elements.summaryEditor.value = data.markdown_text;
                }

                if (data.figure_caption) {
                    elements.captionEditor.value = data.figure_caption;
                }

                if (data.is_sufficiently_detailed) {
                    setStatus("図示可能", "ready", "要約とキャプションを右側へ反映しました。必要に応じて編集してください。");
                } else {
                    setStatus("追加情報が必要", "needs-info", "不足情報への回答を続けて入力してください。");
                }
            } catch (error) {
                clearAssistantActivity();
                pushMessage("assistant", `エラーが発生しました: ${error.message}`);
                setStatus("エラー", "needs-info", error.message);
            } finally {
                clearAssistantActivity();
                setBusy(false);
            }
        }

        function switchMode(mode) {
            if (mode === "__new__") {
                resetNewChat();
                return;
            }
            state.mode = "existing";
            state.sampleName = mode;
            loadSample(mode);
        }

        elements.sampleSelect.addEventListener("change", (event) => {
            switchMode(event.target.value);
        });

        elements.summaryEditor.addEventListener("input", () => {
            state.compiledInstruction = elements.summaryEditor.value.trim();
            syncDraftMeta();
        });

        elements.sendButton.addEventListener("click", submitInstruction);
        elements.generateButton.addEventListener("click", generateFigure);
        elements.saveSvgButton.addEventListener("click", exportGeneratedSvg);
        elements.closeModalButton.addEventListener("click", closeGenerationModal);

        elements.chatInput.addEventListener("keydown", (event) => {
            if ((event.ctrlKey || event.metaKey) && event.key === "Enter") {
                event.preventDefault();
                submitInstruction();
            }
            if (event.key === "Escape") {
                closeGenerationModal();
            }
        });

        elements.generationModal.addEventListener("click", (event) => {
            if (event.target === elements.generationModal) {
                closeGenerationModal();
            }
        });

        resetNewChat();
        syncGenerateHint();
    </script>
</body>

</html>
